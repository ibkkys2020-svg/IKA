<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今何問目ゲーム</title>

  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden; background: black;
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Kaku Gothic ProN", sans-serif;
      color: white; -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    .blink { animation: blink-anime 0.2s infinite alternate; }
    @keyframes blink-anime { 0% { opacity: 1; } 100% { opacity: 0.3; } }
    .flash { animation: flash-anime 0.3s; }
    .correct-flash { animation: correct-flash-anime 0.3s; }
    @keyframes flash-anime { 0% { background: red; } 100% { background: black; } }
    @keyframes correct-flash-anime { 0% { background: #004400; } 100% { background: black; } }
    .center {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; width: 95%; max-width: 450px; z-index: 10;
    }
    #game, #rule, #end { display: none; }
    h1 { font-size: 28px; margin-bottom: 25px; }
    h2 { font-size: 24px; margin-bottom: 20px; }
    #question { font-size: 28px; margin-bottom: 30px; line-height: 1.3; }
    #t-rule-p { text-align: left; display: inline-block; font-size: 16px; line-height: 1.6; margin-bottom: 20px; }
    #summary { font-size: 18px; line-height: 1.5; margin-bottom: 15px; }
    button {
      font-size: 18px; padding: 12px 24px; margin: 8px; border-radius: 12px;
      border: none; cursor: pointer; background: #eee; color: #333;
    }
    #submitBtn { background: cyan; color: black; font-weight: bold; margin-left: 8px; }
    .input-area { display: flex; justify-content: center; align-items: center; }
    
    input {
      font-size: 32px; width: 140px; text-align: center; border-radius: 12px;
      border: 2px solid #555; padding: 10px; background: black; color: white; outline: none;
      appearance: none; -moz-appearance: textfield;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .lang-select { margin-bottom: 25px; display: flex; flex-wrap: wrap; justify-content: center; }
    .lang-btn { 
      font-size: 13px; padding: 6px 12px; margin: 4px; background: #333; color: white; 
      border: 1px solid #555; border-radius: 8px; cursor: pointer; display: inline-block;
    }
    .lang-btn.active { background: cyan; color: black; border-color: cyan; font-weight: bold; }
    .logBox {
      max-height: 35vh; overflow-y: auto; border: 1px solid #555;
      padding: 10px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 10px;
    }
    .logItem { margin-bottom: 12px; padding: 12px; border: 1px solid #333; border-radius: 8px; text-align: left; }
  </style>
</head>
<body onclick="refocus(event)">

  <canvas id="bgCanvas"></canvas>

  <div id="menu" class="center">
    <div class="lang-select">
      <span class="lang-btn active" onclick="setLang('ja', event)">日本語</span>
      <span class="lang-btn" onclick="setLang('en', event)">English</span>
      <span class="lang-btn" onclick="setLang('zh_tw', event)">繁體中文</span>
      <span class="lang-btn" onclick="setLang('zh_cn', event)">简体中文</span>
    </div>
    <h1 id="t-title">今何問目ゲーム</h1>
    <button id="b-rule" onclick="showRule()">ルール</button><br>
    <button id="b-start" onclick="firstStart(event)">スタート</button>
  </div>

  <div id="rule" class="center">
    <h2 id="t-rule-h">ルール</h2>
    <p id="t-rule-p"></p><br>
    <button id="b-back" onclick="backMenu()">戻る</button>
  </div>

  <div id="game" class="center">
    <div id="question"></div>
    <div class="input-area">
      <input id="answer" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="?" autocomplete="off">
      <button id="submitBtn" onclick="submitAnswer()">OK</button>
    </div>
  </div>

  <div id="end" class="center">
    <h2 id="t-result-h">結果</h2>
    <p id="summary"></p>
    <div id="resultText" class="logBox"></div>
    <button id="b-again" onclick="restart()">もう一回</button>
  </div>

  <audio id="bgm" src="Guide_Me_to_Heaven.mp3" loop playsinline></audio>
  <audio id="seCorrect" src="se_correct.mp3" playsinline></audio>
  <audio id="seWrong" src="se_wrong.mp3" playsinline></audio>

  <script>
    const i18n = {
      ja: {
        title: "今何問目ゲーム", ruleBtn: "ルール", startBtn: "スタート",
        ruleH: "ルール", ruleP: "・問題の答えを数字で入力<br>・今何問目か覚える<br>・間違えたら終了",
        backBtn: "戻る", resultH: "結果", againBtn: "もう一回",
        qPrefix: "問目", qAfter: "問後", qBefore: "問前", qFinal: "は何問目？",
        qTrap: "今何問目？", record: "記録", attempts: "挑戦数", your: "あなた", correct: "正解",
        ansCorrect: "○ 正解", ansWrong: "× 不正解", noAns: "未回答", qLog: "問目"
      },
      en: {
        title: "Which Question?", ruleBtn: "Rules", startBtn: "Start",
        ruleH: "Rules", ruleP: "・Enter the answer in numbers<br>・Remember the current number<br>・Game over if wrong",
        backBtn: "Back", resultH: "Result", againBtn: "Try Again",
        qPrefix: "Q", qAfter: " questions after", qBefore: " questions before", qFinal: "What is the number?",
        qTrap: "What is the current question number?", record: "Record", attempts: "Total", your: "You", correct: "Correct",
        ansCorrect: "○ Correct", ansWrong: "× Wrong", noAns: "No Answer", qLog: ""
      },
      zh_tw: {
        title: "現在是第幾題？", ruleBtn: "規則", startBtn: "開始遊戲",
        ruleH: "遊戲規則", ruleP: "・請輸入數字回答<br>・記住現在是第幾題<br>・答錯則遊戲結束",
        backBtn: "返回", resultH: "結算", againBtn: "再玩一次",
        qPrefix: "第", qAfter: "題後", qBefore: "題前", qFinal: "是第幾題？",
        qTrap: "現在是第幾題？", record: "紀錄", attempts: "挑戰數", your: "你的回答", correct: "正確答案",
        ansCorrect: "○ 正確", ansWrong: "× 錯誤", noAns: "未回答", qLog: "題"
      },
      zh_cn: {
        title: "现在是第几题？", ruleBtn: "规则", startBtn: "开始游戏",
        ruleH: "游戏规则", ruleP: "・请输入数字回答<br>・记住现在は第几题<br>・答错則游戏结束",
        backBtn: "返回", resultH: "结算", againBtn: "再玩一次",
        qPrefix: "第", qAfter: "题后", qBefore: "题前", qFinal: "是题第几题？",
        qTrap: "现在是第几题？", record: "纪录", attempts: "挑战数", your: "你的回答", correct: "正确答案",
        ansCorrect: "○ 正确", ansWrong: "× 错误", noAns: "未回答", qLog: "题"
      }
    };

    let lang = 'ja';
    let currentQuestion = 1;
    let currentText = "";
    let correctAnswer = 0;
    let history = [];
    let timeLeft = 100;
    let timerInterval;
    let isSubmitting = false;
    let isGameOver = false;
    let bgmStarted = false;

    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    const bgm = document.getElementById("bgm");
    const seCorrect = document.getElementById("seCorrect");
    const seWrong = document.getElementById("seWrong");
    const inputField = document.getElementById("answer");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.onresize = resizeCanvas;
    resizeCanvas();

    function refocus(e) {
      if (e && e.target.classList.contains('lang-btn')) return; 
      if (document.getElementById("game").style.display === "block" && !isGameOver) {
        inputField.focus();
      }
    }

    function setLang(newLang, event) {
      if(event) event.stopPropagation();
      lang = newLang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      updateLangUI();
    }

    function updateLangUI() {
      const t = i18n[lang];
      document.getElementById('t-title').innerText = t.title;
      document.getElementById('b-rule').innerText = t.ruleBtn;
      document.getElementById('b-start').innerText = t.startBtn;
      document.getElementById('t-rule-h').innerText = t.ruleH;
      document.getElementById('t-rule-p').innerHTML = t.ruleP;
      document.getElementById('b-back').innerText = t.backBtn;
      document.getElementById('t-result-h').innerText = t.resultH;
      document.getElementById('b-again').innerText = t.againBtn;
    }
    updateLangUI();

    function firstStart(event) {
      if(event) event.stopPropagation();
      bgm.volume = 0.5;
      bgm.play().catch(() => {});
      bgmStarted = true;
      seCorrect.load();
      seWrong.load();
      startGame();
    }

    // ★重要：SEだけを個別にロードして鳴らす（BGMには干渉しない）
    async function playSE(audioObj) {
      if (!audioObj) return;
      
      bgm.volume = 0.15; // SEを強調するためにBGM音量を下げる
      
      audioObj.pause();
      audioObj.load(); // SEのみリロード（BGMはそのまま！）
      audioObj.currentTime = 0;
      audioObj.volume = 0.9;
      
      try {
        await audioObj.play();
        setTimeout(() => {
          if (!isGameOver) bgm.volume = 0.5;
        }, 500);
      } catch (e) {
        bgm.volume = 0.5;
      }
    }

    function showRule() {
      document.getElementById("menu").style.display = "none";
      document.getElementById("rule").style.display = "block";
    }
    function backMenu() {
      document.getElementById("rule").style.display = "none";
      document.getElementById("menu").style.display = "block";
    }

    function startGame() {
      document.getElementById("menu").style.display = "none";
      document.getElementById("end").style.display = "none";
      document.getElementById("game").style.display = "block";
      currentQuestion = 1; history = []; isGameOver = false; isSubmitting = false;
      inputField.value = "";
      document.body.classList.remove("flash", "correct-flash");
      canvas.classList.remove("blink");
      nextQuestion();
    }

    function restart() {
      clearInterval(timerInterval);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      document.getElementById("end").style.display = "none";
      document.getElementById("menu").style.display = "block";
      // BGMが止まっていれば再開（最初からはリセットされない）
      if (bgmStarted && bgm.paused) {
        bgm.play().catch(() => {});
      }
      bgm.volume = 0.5;
    }

    function nextQuestion() {
      clearInterval(timerInterval);
      isSubmitting = false;
      canvas.classList.remove("blink");
      if (Math.random() < 0.3) {
        correctAnswer = currentQuestion;
        currentText = i18n[lang].qTrap;
      } else {
        generateNormalProblem();
      }
      document.getElementById("question").innerText = currentText;
      startTimer();
      setTimeout(() => inputField.focus(), 50);
    }

    function generateNormalProblem() {
      const t = i18n[lang];
      let baseNum = Math.floor(Math.random() * 20) + 10;
      let resultNum = baseNum;
      let text = (lang === 'en' || lang.startsWith('zh')) ? t.qPrefix + baseNum : baseNum + t.qPrefix;

      for (let i = 0; i < 3; i++) {
        let moveNum = Math.floor(Math.random() * 9) + 1;
        let sep = (lang === 'ja') ? "の" : " ";
        if (Math.random() > 0.5) {
          text += sep + moveNum + t.qAfter;
          resultNum += moveNum;
        } else {
          if (resultNum - moveNum < 1) {
            text += sep + moveNum + t.qAfter;
            resultNum += moveNum;
          } else {
            text += sep + moveNum + t.qBefore;
            resultNum -= moveNum;
          }
        }
      }
      correctAnswer = resultNum;
      currentText = text + (lang === 'en' ? " " : "") + t.qFinal;
    }

    function startTimer() {
      timeLeft = 100;
      timerInterval = setInterval(() => {
        if (isGameOver) return;
        timeLeft--;
        drawTimerCanvas();
        if (timeLeft <= 0) {
          history.push({ number: currentQuestion, question: currentText, your: i18n[lang].noAns, correct: correctAnswer, result: false });
          gameOver();
        }
      }, 100);
    }

    function drawTimerCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const cx = canvas.width / 2; const cy = canvas.height / 2;
      const rA = Math.min(canvas.width, canvas.height) / 2 - 60;
      const rB = rA * 0.6;
      const totalBars = 120;
      const visibleBars = Math.floor((timeLeft / 100) * totalBars);

      if (timeLeft <= 30) canvas.classList.add("blink"); else canvas.classList.remove("blink");

      for (let i = 0; i < totalBars; i++) {
        let angle = (i / totalBars) * Math.PI * 2 - Math.PI / 2;
        let x = cx + rA * Math.cos(angle); let y = cy + rB * Math.sin(angle);
        let color = (i < visibleBars) ? (timeLeft <= 30 ? "red" : (timeLeft < 60 ? "orange" : "cyan")) : "#333";
        ctx.beginPath(); ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(angle) * 18, y + Math.sin(angle) * 18);
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();
      }
    }

    function submitAnswer() {
      if (inputField.value === "" || isSubmitting || isGameOver) return;
      isSubmitting = true; 
      clearInterval(timerInterval);
      
      let inputAns = Number(inputField.value);
      let isCorrect = (inputAns === correctAnswer);
      history.push({ number: currentQuestion, question: currentText, your: inputAns, correct: correctAnswer, result: isCorrect });
      
      if (!isCorrect) { gameOver(); return; }
      
      // 正解演出
      playSE(seCorrect);
      document.body.classList.add("correct-flash");
      setTimeout(() => document.body.classList.remove("correct-flash"), 300);

      currentQuestion++; 
      inputField.value = "";
      nextQuestion();
    }

    inputField.addEventListener("keydown", (e) => { 
      const isControl = ["Backspace", "Delete", "ArrowLeft", "ArrowRight", "Tab", "Enter"].includes(e.key);
      if (e.key === "Enter") {
        e.preventDefault();
        submitAnswer(); 
      } else if (!/^[0-9]$/.test(e.key) && !isControl) {
        e.preventDefault();
      }
    });

    function gameOver() {
      if (isGameOver) return;
      isGameOver = true; 
      clearInterval(timerInterval);
      playSE(seWrong);
      document.body.classList.add("flash");
      inputField.blur();

      setTimeout(() => {
        document.getElementById("game").style.display = "none";
        document.getElementById("end").style.display = "block";
        const t = i18n[lang];
        let correctCount = history.filter(r => r.result).length;
        document.getElementById("summary").innerHTML = `${t.record}: ${correctCount}<br>${t.attempts}: ${history.length}`;
        let logHtml = "";
        history.forEach(r => {
          let qNum = (lang === 'en' || lang.startsWith('zh')) ? t.qPrefix + r.number + t.qLog : r.number + t.qLog;
          logHtml += `<div class="logItem"><b>${qNum}</b><br>${r.question}<br>${t.your}: ${r.your} / ${t.correct}: ${r.correct}<br><span style="color:${r.result?'lime':'red'}">${r.result?t.ansCorrect:t.ansWrong}</span></div>`;
        });
        document.getElementById("resultText").innerHTML = logHtml;
      }, 200);
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) { bgm.pause(); } else {
        if (bgmStarted && (document.getElementById("game").style.display === "block" || document.getElementById("menu").style.display === "block")) {
          bgm.play().catch(() => {});
        }
      }
    });
  </script>
</body>
</html>
